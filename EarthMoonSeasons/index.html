<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Earth Moon Seasons</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
<canvas id="space"></canvas>
<script>
(() => {
  const TAU = Math.PI * 2;
  const canvas = document.getElementById("space");
  const ctx = canvas.getContext("2d");
  const earthTexture = new Image();
  earthTexture.src = "earth-blue-marble.png";
  let w = 0, h = 0, dpr = 1, unit = 1;

  const seasons = [
    ["MAR EQUINOX", "ISRAEL SPRING", 0],
    ["JUN SOLSTICE", "DRY SUMMER", Math.PI / 2],
    ["SEP EQUINOX", "AUTUMN TRANSITION", Math.PI],
    ["DEC SOLSTICE", "RAINY WINTER", Math.PI * 1.5]
  ];
  const months = [
    ["MAR", 0], ["APR", Math.PI / 6], ["MAY", Math.PI / 3],
    ["JUN", Math.PI / 2], ["JUL", Math.PI * 2 / 3], ["AUG", Math.PI * 5 / 6],
    ["SEP", Math.PI], ["OCT", Math.PI * 7 / 6], ["NOV", Math.PI * 4 / 3],
    ["DEC", Math.PI * 1.5], ["JAN", Math.PI * 5 / 3], ["FEB", Math.PI * 11 / 6]
  ];
  const israelLat = 31.8 * Math.PI / 180;
  const axisTilt = 23.5 * Math.PI / 180;
  const yearDuration = 45 * 60 * 1000;
  const earthDaysPerYear = 365.25;
  const moonOrbitsPerYear = 13.37;

  function norm(a) {
    return ((a % TAU) + TAU) % TAU;
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    unit = Math.min(w, h);
  }

  function circle(x, y, r, fill) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.fillStyle = fill;
    ctx.fill();
  }

  function label(text, x, y, color = "#aeb5c8", size = 12, align = "left") {
    ctx.font = `${size}px system-ui, Segoe UI, sans-serif`;
    ctx.textAlign = align;
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
  }

  function orbit(x, y, r, color = "rgba(195, 166, 115, 0.18)") {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function trail(x, y, r, a, color, width) {
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineWidth = width;
    for (let i = 8; i >= 0; i--) {
      const alpha = Math.round((9 - i) * 4).toString(16).padStart(2, "0");
      ctx.beginPath();
      ctx.arc(x, y, r, a - (i + 1) * 0.028, a - i * 0.028);
      ctx.strokeStyle = `${color}${alpha}`;
      ctx.stroke();
    }
    ctx.restore();
  }

  function litBody(x, y, r, lightAngle, lit, dark, glow = 0.16) {
    circle(x, y, r + 6, `${lit}24`);
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.clip();
    ctx.fillStyle = dark;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
    const lx = x + Math.cos(lightAngle) * r * 0.65;
    const ly = y + Math.sin(lightAngle) * r * 0.65;
    const shade = ctx.createRadialGradient(lx, ly, r * 0.1, x, y, r * 1.35);
    shade.addColorStop(0, lit);
    shade.addColorStop(0.52, lit);
    shade.addColorStop(0.74, "rgba(28, 38, 58, 0.72)");
    shade.addColorStop(1, "#05070b");
    ctx.fillStyle = shade;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.restore();
    circle(x + Math.cos(lightAngle) * r * 0.28, y + Math.sin(lightAngle) * r * 0.28, r * glow, "rgba(255,255,255,0.12)");
  }

  function drawEarthSurface(x, y, r, spin) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(axisTilt);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, TAU);
    ctx.clip();

    if (earthTexture.complete && earthTexture.naturalWidth) {
      const slices = Math.max(20, Math.ceil(r * 1.6));
      for (let i = 0; i < slices; i++) {
        const left = -1 + i * 2 / slices;
        const right = -1 + (i + 1) * 2 / slices;
        const longitude = Math.asin((left + right) / 2);
        const sourceX = Math.min(earthTexture.naturalWidth - 1, Math.floor(norm(spin + longitude) / TAU * earthTexture.naturalWidth));
        ctx.drawImage(earthTexture, sourceX, 0, 1, earthTexture.naturalHeight, left * r, -r, (right - left) * r + 1, r * 2);
      }
    } else {
      const ocean = ctx.createRadialGradient(-r * 0.35, -r * 0.4, 1, 0, 0, r * 1.2);
      ocean.addColorStop(0, "#3988c8");
      ocean.addColorStop(1, "#071b32");
      ctx.fillStyle = ocean;
      ctx.fillRect(-r, -r, r * 2, r * 2);
      ctx.strokeStyle = "rgba(210,230,255,0.16)";
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.ellipse(0, i * r * 0.28, r * 0.78, r * 0.08, 0, 0, TAU);
        ctx.stroke();
      }
    }

    ctx.strokeStyle = "rgba(255,255,255,0.20)";
    ctx.lineWidth = Math.max(0.7, r * 0.025);
    ctx.lineCap = "round";
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(Math.sin(spin * 0.13 + i * 1.7) * r * 0.28, (i - 1.5) * r * 0.28, r * (0.22 + i * 0.035), r * 0.045, i * 0.13, 0.15, Math.PI * 1.75);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawLatitude(x, y, r, latitude, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(axisTilt);
    ctx.beginPath();
    ctx.ellipse(0, -Math.sin(latitude) * r * 0.82, Math.cos(latitude) * r * 0.78, Math.max(1, Math.cos(latitude) * r * 0.065), 0, 0, TAU);
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, r * 0.025);
    ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.restore();
  }

  function drawEarth(x, y, r, lightAngle, spin, declination, showLatitudes = false) {
    drawEarthSurface(x, y, r, spin);
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.clip();
    const shadow = ctx.createLinearGradient(
      x + Math.cos(lightAngle) * r, y + Math.sin(lightAngle) * r,
      x - Math.cos(lightAngle) * r, y - Math.sin(lightAngle) * r
    );
    shadow.addColorStop(0, "rgba(255,255,255,0.08)");
    shadow.addColorStop(0.48, "rgba(0,0,0,0.02)");
    shadow.addColorStop(0.66, "rgba(0,0,0,0.42)");
    shadow.addColorStop(1, "rgba(0,0,0,0.92)");
    ctx.fillStyle = shadow;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.restore();

    ctx.save();
    ctx.shadowBlur = r * 0.42;
    ctx.shadowColor = "rgba(81, 166, 255, 0.65)";
    ctx.strokeStyle = "rgba(126, 194, 255, 0.62)";
    ctx.lineWidth = Math.max(1, r * 0.055);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.stroke();
    ctx.restore();

    if (showLatitudes) {
      drawLatitude(x, y, r, israelLat, "rgba(92, 194, 255, 0.80)");
      drawLatitude(x, y, r, declination, "rgba(255, 208, 109, 0.88)");
    }
  }

  function drawMoonSurface(x, y, r, faceAngle) {
    const craters = [
      [0.14, -0.28, 0.16], [-0.24, 0.12, 0.11], [0.30, 0.18, 0.08]
    ];
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.clip();
    ctx.translate(x, y);
    ctx.rotate(faceAngle);
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = Math.max(1, r * 0.04);
    ctx.beginPath();
    ctx.moveTo(-r * 0.55, 0);
    ctx.lineTo(r * 0.55, 0);
    ctx.stroke();
    for (const [cx, cy, size] of craters) {
      ctx.beginPath();
      ctx.arc(cx * r, cy * r, size * r, 0, TAU);
      ctx.strokeStyle = "rgba(0,0,0,0.30)";
      ctx.stroke();
    }
    ctx.restore();
  }

  function moonPhaseName(phase) {
    const names = ["NEW MOON", "WAXING CRESCENT", "FIRST QUARTER", "WAXING GIBBOUS", "FULL MOON", "WANING GIBBOUS", "LAST QUARTER", "WANING CRESCENT"];
    return names[Math.floor((norm(phase) / TAU) * 8 + 0.5) % 8];
  }

  function currentSeason(year) {
    const q = Math.floor(norm(year) / (Math.PI / 2)) % 4;
    return seasons[q][1];
  }

  function currentMonth(year) {
    return months[Math.floor((norm(year) + TAU / 24) / (TAU / 12)) % 12][0];
  }

  function solarDeclination(year) {
    return axisTilt * Math.sin(year);
  }

  function daylightHours(year) {
    const declination = solarDeclination(year);
    const hourAngle = Math.acos(Math.max(-1, Math.min(1, -Math.tan(israelLat) * Math.tan(declination))));
    return 24 * hourAngle / Math.PI;
  }

  console.assert(solarDeclination(Math.PI / 2) > 0 && daylightHours(Math.PI / 2) > daylightHours(Math.PI * 1.5), "Season model check failed");

  function drawDaylightGraph(x, y, width, height, year) {
    const minDay = 9.8;
    const maxDay = 14.4;
    const current = daylightHours(year);
    const mapY = hours => y + height - ((hours - minDay) / (maxDay - minDay)) * height;

    label("ISRAEL DAYLIGHT", x + width / 2, y - 16, "#c7cfdf", 12, "center");
    label("JERUSALEM 31.8N", x + width / 2, y + height + 30, "#6f7890", 9, "center");
    ctx.strokeStyle = "rgba(174, 181, 200, 0.18)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y + height);
    ctx.lineTo(x + width, y + height);
    ctx.stroke();

    label("14H", x - 10, y + 4, "#6f7890", 8, "right");
    label("10H", x - 10, y + height + 3, "#6f7890", 8, "right");

    ctx.beginPath();
    for (let i = 0; i <= 96; i++) {
      const a = i / 96 * TAU;
      const px = x + i / 96 * width;
      const py = mapY(daylightHours(a));
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = "rgba(255, 208, 109, 0.72)";
    ctx.lineWidth = 1.8;
    ctx.stroke();

    const px = x + norm(year) / TAU * width;
    const py = mapY(current);
    ctx.strokeStyle = "rgba(77, 134, 220, 0.45)";
    ctx.beginPath();
    ctx.moveTo(px, y);
    ctx.lineTo(px, y + height);
    ctx.stroke();
    circle(px, py, 4, "#4d86dc");
    label(`${current.toFixed(1)}H`, px, py - 8, "#d8a84e", 9, "center");
  }

  function drawPhaseMoon(x, y, r, phase, lightAngle) {
    const illum = (1 - Math.cos(phase)) / 2;
    litBody(x, y, r, lightAngle, "#d8d3c4", "#1a1b20", 0.08);
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.clip();
    ctx.globalCompositeOperation = "source-atop";
    ctx.fillStyle = `rgba(0,0,0,${0.85 - illum * 0.75})`;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.restore();
  }

  function drawMoon(x, y, r, phase, lightAngle, faceAngle) {
    drawPhaseMoon(x, y, r, phase, lightAngle);
    drawMoonSurface(x, y, r, faceAngle);
  }

  function drawSun(x, y, r) {
    const glow = ctx.createRadialGradient(x, y, 2, x, y, r * 3.4);
    glow.addColorStop(0, "rgba(255, 210, 112, 0.98)");
    glow.addColorStop(0.34, "rgba(255, 190, 80, 0.32)");
    glow.addColorStop(1, "rgba(255, 160, 60, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, r * 3.4, 0, TAU);
    ctx.fill();
    circle(x, y, r, "#ffd06d");
    label("SUN", x + r + 9, y + 4, "#d8a84e", 12);
  }

  function drawSunlightRays(x, y, r, angle) {
    const ux = Math.cos(angle);
    const uy = Math.sin(angle);
    const px = -uy;
    const py = ux;
    ctx.save();
    ctx.strokeStyle = "rgba(255, 208, 109, 0.66)";
    ctx.fillStyle = "rgba(255, 208, 109, 0.78)";
    ctx.lineWidth = 1.2;
    for (const offset of [-1.25, 0, 1.25]) {
      const sx = x - ux * r * 5.5 + px * r * offset;
      const sy = y - uy * r * 5.5 + py * r * offset;
      const ex = x - ux * r * 1.45 + px * r * offset;
      const ey = y - uy * r * 1.45 + py * r * offset;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - ux * 5 + px * 3, ey - uy * 5 + py * 3);
      ctx.lineTo(ex - ux * 5 - px * 3, ey - uy * 5 - py * 3);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawAxis(x, y, r, showNorth = false) {
    const tilt = -Math.PI / 2 + axisTilt;
    const nx = Math.cos(tilt);
    const ny = Math.sin(tilt);
    ctx.strokeStyle = "#cbd2e3";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(x - nx * r * 1.45, y - ny * r * 1.45);
    ctx.lineTo(x + nx * r * 1.45, y + ny * r * 1.45);
    ctx.stroke();
    if (showNorth) label("N", x + nx * r * 1.7, y + ny * r * 1.7 + 3, "#cbd2e3", 9, "center");
  }

  function render(now) {
    const cx = w * (w > 900 ? 0.42 : 0.5);
    const cy = h * 0.52;
    const orbitR = unit * (w > 900 ? 0.30 : w > 700 ? 0.32 : 0.24);
    const earthR = Math.max(12, unit * 0.020);
    const moonOrbit = Math.max(34, unit * 0.060);
    const moonR = Math.max(4, unit * 0.007);
    const sunR = Math.max(16, unit * 0.030);
    const elapsedYear = now / yearDuration * TAU + 0.2;
    const year = norm(elapsedYear);
    const moonA = norm(Math.PI + elapsedYear * moonOrbitsPerYear);
    const earthSpin = elapsedYear * earthDaysPerYear;
    const declination = solarDeclination(year);
    const seasonNow = currentSeason(year);
    const monthNow = currentMonth(year);

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    orbit(cx, cy, orbitR);
    if (w > 700) {
      for (const [month, a] of months) {
        const inner = orbitR - 5;
        const outer = orbitR + 5;
        const ix = cx + Math.cos(a) * inner;
        const iy = cy + Math.sin(a) * inner;
        const ox = cx + Math.cos(a) * outer;
        const oy = cy + Math.sin(a) * outer;
        ctx.beginPath();
        ctx.moveTo(ix, iy);
        ctx.lineTo(ox, oy);
        ctx.strokeStyle = month === monthNow ? "rgba(255, 208, 109, 0.85)" : "rgba(174, 181, 200, 0.18)";
        ctx.lineWidth = month === monthNow ? 1.4 : 1;
        ctx.stroke();
        label(month, cx + Math.cos(a) * (orbitR - 18), cy + Math.sin(a) * (orbitR - 18) + 3, month === monthNow ? "#ffd06d" : "#687186", 8, "center");
      }
    }
    for (const [mark, season, a] of seasons) {
      const mx = cx + Math.cos(a) * orbitR;
      const my = cy + Math.sin(a) * orbitR;
      circle(mx, my, 3, "#8c7652");
      if (w > 700) {
        label(mark, mx + 8, my + 4, "#8d95aa", 9);
        label(season, mx + 8, my + 16, "#c2a262", 9);
      }
    }

    const earthX = cx + Math.cos(year) * orbitR;
    const earthY = cy + Math.sin(year) * orbitR;
    const sunAngleFromEarth = Math.atan2(cy - earthY, cx - earthX);
    const moonX = earthX + Math.cos(moonA) * moonOrbit;
    const moonY = earthY + Math.sin(moonA) * moonOrbit;
    const moonLight = Math.atan2(cy - moonY, cx - moonX);
    const phase = norm(moonA - sunAngleFromEarth);

    trail(cx, cy, orbitR, year, "#4d86dc", Math.max(1, earthR * 0.22));
    drawSun(cx, cy, sunR);

    orbit(earthX, earthY, moonOrbit, "rgba(174, 181, 200, 0.16)");
    trail(earthX, earthY, moonOrbit, moonA, "#d8d3c4", 1);
    drawSunlightRays(earthX, earthY, earthR, sunAngleFromEarth + Math.PI);
    drawEarth(earthX, earthY, earthR, sunAngleFromEarth, earthSpin, declination);
    drawAxis(earthX, earthY, earthR);
    if (w > 700) {
      label("EARTH", earthX + earthR + 12, earthY + 4, "#aeb5c8", 12);
      label("23.5 DEG AXIS", earthX + earthR + 12, earthY + 17, "#6f7890", 9);
    }

    drawMoon(moonX, moonY, moonR, phase, moonLight, Math.atan2(earthY - moonY, earthX - moonX));
    if (w > 700) label("MOON", moonX + moonR + 6, moonY + 3, "#8d95aa", 9);

    if (w > 760 && h > 560) {
      const ix = w * 0.78;
      const py = h * 0.28;
      const sy = Math.max(py + 180, h * 0.60);
      const daylight = daylightHours(year);
      const northStatus = declination > 0.012 ? "NORTH TILTED TOWARD SUN" : declination < -0.012 ? "NORTH TILTED AWAY FROM SUN" : "HEMISPHERES RECEIVE EQUAL LIGHT";
      const directLatitude = Math.abs(declination) < 0.008 ? "EQUATOR" : `${Math.abs(declination * 180 / Math.PI).toFixed(1)} DEG ${declination > 0 ? "N" : "S"}`;

      label("EARTH ROTATION / MOON LOCK", ix, py - 62, "#c7cfdf", 12, "center");
      drawEarth(ix - 58, py, 42, -0.45, earthSpin, declination, true);
      drawAxis(ix - 58, py, 42, true);
      drawMoon(ix + 58, py, 27, phase, -0.45, -0.45);
      label("ROTATING EARTH", ix - 58, py + 58, "#d8d3c4", 9, "center");
      label(moonPhaseName(phase), ix + 58, py + 50, "#d8d3c4", 9, "center");
      label(`${Math.round(((1 - Math.cos(phase)) / 2) * 100)}% LIT / MOON LOCKED`, ix, py + 70, "#7d879b", 9, "center");

      label("AXIAL TILT, NOT DISTANCE", ix, py + 98, "#ffd06d", 11, "center");
      label(northStatus, ix, py + 116, "#c7cfdf", 9, "center");
      label(`DIRECT RAYS: ${directLatitude}`, ix, py + 132, "#d8a84e", 9, "center");
      label(`ISRAEL 31.8N: ${daylight.toFixed(1)}H DAYLIGHT`, ix, py + 148, "#75c7ff", 9, "center");

      label("SEASON", ix, sy - 48, "#c7cfdf", 12, "center");
      orbit(ix, sy, 34, "rgba(195, 166, 115, 0.22)");
      for (const [, season, a] of seasons) {
        const sx = ix + Math.cos(a) * 34;
        const yy = sy + Math.sin(a) * 34;
        circle(sx, yy, season === seasonNow ? 4 : 2.5, season === seasonNow ? "#ffd06d" : "#806f52");
      }
      circle(ix + Math.cos(year) * 34, sy + Math.sin(year) * 34, 5, "#4d86dc");
      label(`${monthNow} / ${seasonNow}`, ix, sy + 58, "#d8a84e", 11, "center");
      label("ISRAEL VIEW", ix, sy + 73, "#7d879b", 9, "center");

      if (h > 620) {
        drawDaylightGraph(w * 0.68, h * 0.78, Math.min(260, w * 0.23), 56, year);
      }
    } else if (h > 560) {
      const directLatitude = Math.abs(declination) < 0.008 ? "EQUATOR" : `${Math.abs(declination * 180 / Math.PI).toFixed(1)} DEG ${declination > 0 ? "N" : "S"}`;
      label("AXIAL TILT, NOT DISTANCE", w / 2, h - 62, "#ffd06d", 10, "center");
      label(`${monthNow} / ${seasonNow} / DIRECT RAYS: ${directLatitude}`, w / 2, h - 44, "#c7cfdf", 8, "center");
      label(`JERUSALEM 31.8N: ${daylightHours(year).toFixed(1)}H DAYLIGHT`, w / 2, h - 28, "#75c7ff", 8, "center");
    }

    requestAnimationFrame(render);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
